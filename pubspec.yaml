name: confidantsante
description: Application mobile de suivi de l'observance thérapeutique des PVVIH
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase — seulement Core et Firestore
  firebase_core: ^2.24.2
  cloud_firestore: ^4.13.6

  # Base de données locale offline
  sqflite: ^2.3.0
  path: ^1.8.3

  # Notifications locales
  flutter_local_notifications: ^17.2.4

  # Sécurité — stockage PIN
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^12.1.3

  # State management
  provider: ^6.1.1

  # UI
  flutter_svg: ^2.0.9
  smooth_page_indicator: ^1.1.0

  # Intl
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/


